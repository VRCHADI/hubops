services:

  mysql:
    image: mysql:8.0
    container_name: hubops-mysql

    environment:
      MYSQL_DATABASE: hubopsdb
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - hubops_mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: hubops-backend

    depends_on:
      - mysql

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hubopsdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    ports:
      - "8080:8080"

  frontend:
    build: ./hubops-front
    container_name: hubops-frontend

    depends_on:
      - backend

    ports:
      - "4200:80"

volumes:
  hubops_mysql_data: