services:

  mysql:
    image: mysql:8.0
    container_name: hubops-mysql

    environment:
      MYSQL_DATABASE: hubopsdb
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - hubops_mysql_data:/var/lib/mysql

  kafka:
    image: apache/kafka:3.8.1
    container_name: hubops-kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  backend:
    build: .
    container_name: hubops-backend

    depends_on:
      - mysql
      - kafka

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hubopsdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    ports:
      - "8080:8080"

  frontend:
    build: ./hubops-front
    container_name: hubops-frontend

    depends_on:
      - backend

    ports:
      - "4200:80"

volumes:
  hubops_mysql_data: