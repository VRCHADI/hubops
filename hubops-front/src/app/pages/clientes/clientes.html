<section class="clientes-page">

  <div class="topbar">
    <h1>Clientes</h1>
    <p>Gerencie os clientes cadastrados no HubOps.</p>
  </div>

  <div class="form-card">

    <h2>Novo Cliente</h2>

    <div class="form-grid">

      <input
        type="text"
        placeholder="Nome"
        [(ngModel)]="novoCliente.nome"
      />

      <input
        type="email"
        placeholder="E-mail"
        [(ngModel)]="novoCliente.email"
      />

      <input
        type="text"
        placeholder="Documento"
        [(ngModel)]="novoCliente.documento"
      />

    </div>

    <button (click)="cadastrarCliente()">
      Cadastrar Cliente
    </button>

  </div>

  <p *ngIf="carregando()">Carregando clientes...</p>

  <p *ngIf="erro()">
    {{ erro() }}
  </p>

  <div class="clientes-grid" *ngIf="!carregando() && !erro()">

    <div class="cliente-card" *ngFor="let cliente of clientes()">
      <strong>{{ cliente.nome }}</strong>
      <span>{{ cliente.email }}</span>
      <small>Documento: {{ cliente.documento }}</small>
    </div>

  </div>

</section>
