<div class="login-container">
  <div class="login-card">
    <h1>HubOps</h1>
    <p>Acesse sua conta para continuar</p>

    <label>E-mail</label>
    <input
  type="email"
  placeholder="Digite seu e-mail"
  [(ngModel)]="email"
/>

    <label>Senha</label>
    <input
  type="password"
  placeholder="Digite sua senha"
  [(ngModel)]="senha"
/>
    <button (click)="entrar()">Entrar</button>
  </div>
</div>
