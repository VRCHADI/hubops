<div class="login-container">

  <div class="login-brand">

  <img
    src="assets/images/hubops-logo.png"
    alt="HubOps"
  />

  <p>Sistema de Operações Logísticas</p>

</div>

  <div class="login-card">

    <label>E-mail</label>

    <input
      type="email"
      placeholder="Digite seu e-mail"
      [(ngModel)]="email"
    />

    <label>Senha</label>

    <input
      type="password"
      placeholder="Digite sua senha"
      [(ngModel)]="senha"
    />

    <button (click)="entrar()">
      Entrar
    </button>

  </div>

</div>
